name: Generate Social Media Posts

on:
  push:
    branches: [ main ]
    paths:
      - '_posts/**'

  # Allow manual triggering
  workflow_dispatch:

jobs:
  generate-social-posts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for commit messages

      - name: Identify new blog post
        id: new_post
        run: |
          # Get the latest commit message to identify the new post
          LATEST_COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          echo "Latest commit: $LATEST_COMMIT_MSG"
          
          # Find the latest blog post file added
          NEWEST_POST=$(find _posts -name "*.markdown" -o -name "*.md" -type f -exec stat -c "%Y %n" {} \; | sort -nr | head -1 | cut -d" " -f2-)
          echo "Newest post: $NEWEST_POST"
          echo "NEWEST_POST=$NEWEST_POST" >> $GITHUB_ENV
          
          # Extract title from the post
          POST_TITLE=$(grep -m 1 '^title:' "$NEWEST_POST" | sed 's/title: "\(.*\)"/\1/' | sed "s/title: '(.*)'/\1/")
          POST_TITLE_CLEAN=${POST_TITLE#'"'}
          POST_TITLE_CLEAN=${POST_TITLE_CLEAN%'"'}
          echo "POST_TITLE=$POST_TITLE_CLEAN" >> $GITHUB_ENV
          
          # Extract description from the post
          POST_DESC=$(grep -m 1 'description:' "$NEWEST_POST" | sed 's/description: "\(.*\)"/\1/' | sed "s/description: '(.*)'/\1/")
          POST_DESC_CLEAN=${POST_DESC#'"'}
          POST_DESC_CLEAN=${POST_DESC_CLEAN%'"'}
          echo "POST_DESC=$POST_DESC_CLEAN" >> $GITHUB_ENV
          
          echo "TITLE=$POST_TITLE_CLEAN"
          echo "DESC=$POST_DESC_CLEAN"

      - name: Generate AI Social Media Content via GitHub Models
        id: ai_content
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN || secrets.GH_MODELS_TOKEN }}
        run: |
          # Extract post content for AI context
          POST_SNIPPET=$(grep -v '^---' "$NEWEST_POST" | head -n 60 | head -c 3000)
          
          # Generate slug from filename
          SLUG=$(basename "$NEWEST_POST" | sed 's/^[0-9]*-[0-9]*-[0-9]*-//g' | sed 's/\.[^.]*$//g')
          POST_URL="https://joeywang.github.io/posts/$SLUG"
          
          # Extract tags from frontmatter
          POST_TAGS=$(grep -A 20 '^tags:' "$NEWEST_POST" | grep '^\s*\-' | sed 's/^\s*-\s*//' | tr '\n' ', ' | sed 's/, $//')
          
          # Build prompt for GitHub Models
          PROMPT="You are a social media manager for a Ruby on Rails engineering blog. Generate Twitter and LinkedIn posts for a new article.

          Article Details:
          - Title: $POST_TITLE
          - Description: $POST_DESC
          - Tags: $POST_TAGS
          - URL: $POST_URL

          Article Content Snippet:
          $POST_SNIPPET

          Generate the following in JSON format:
          1. \"twitter\": A compelling Twitter post under 280 chars. Include the URL and 2-3 relevant hashtags.
          2. \"linkedin\": A professional LinkedIn post (200-400 chars) with a hook, key takeaways from the actual content, and 4-6 relevant hashtags. End with a question or call-to-action.

          Return ONLY valid JSON: {\"twitter\": \"...\", \"linkedin\": \"...\"}"
          
          # Call GitHub Models API
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://models.inference.ai.azure.com/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -d "$(cat << ENDJSON
          {
            "model": "gpt-4o-mini",
            "messages": [
              {"role": "system", "content": "You output only valid JSON, no markdown."},
              {"role": "user", "content": $(echo "$PROMPT" | jq -Rs .)}
            ],
            "temperature": 0.7,
            "max_tokens": 600
          }
          ENDJSON
          )")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          
          use_fallback() {
            TWITTER_FALLBACK="🚀 Just published: $POST_TITLE

          $POST_DESC

          Read more: $POST_URL

          #RubyOnRails #Performance #Tech"
            [ ${#TWITTER_FALLBACK} -gt 280 ] && TWITTER_FALLBACK="${TWITTER_FALLBACK:0:277}..."
            LINKEDIN_FALLBACK="🚀 New article: \"$POST_TITLE\"

          $POST_DESC

          Read the full article: $POST_URL

          #RubyOnRails #Performance #BackendEngineering #Development #Tech"
            echo "TWITTER_POST<<EOF" >> $GITHUB_ENV
            echo "$TWITTER_FALLBACK" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
            echo "LINKEDIN_POST<<EOF" >> $GITHUB_ENV
            echo "$LINKEDIN_FALLBACK" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          }
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "GitHub Models API error (HTTP $HTTP_CODE): $BODY"
            echo "Falling back to template-based generation..."
            use_fallback
          else
            CONTENT=$(echo "$BODY" | jq -r '.choices[0].message.content // ""')
            if [ -z "$CONTENT" ] || [ "$CONTENT" = "null" ]; then
              echo "Empty response from model, using fallback"
              use_fallback
            else
              TWITTER_GEN=$(echo "$CONTENT" | jq -r '.twitter // ""')
              LINKEDIN_GEN=$(echo "$CONTENT" | jq -r '.linkedin // ""')
              echo "TWITTER_POST<<EOF" >> $GITHUB_ENV
              echo "$TWITTER_GEN" >> $GITHUB_ENV
              echo "EOF" >> $GITHUB_ENV
              echo "LINKEDIN_POST<<EOF" >> $GITHUB_ENV
              echo "$LINKEDIN_GEN" >> $GITHUB_ENV
              echo "EOF" >> $GITHUB_ENV
            fi
          fi
          
          echo "Posts generated. Twitter length: ${#TWITTER_POST:-0}, LinkedIn length: ${#LINKEDIN_POST:-0}"

      - name: Print Generated Content
        run: |
          echo "Twitter Post:"
          echo "$TWITTER_POST"
          echo ""
          echo "LinkedIn Post:"
          echo "$LINKEDIN_POST"

      # Optional: Post to Buffer (Twitter + LinkedIn)
      - name: Post to Buffer
        env:
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          TWITTER_PROFILE_ID: ${{ secrets.BUFFER_TWITTER_PROFILE_ID }}
          LINKEDIN_PROFILE_ID: ${{ secrets.BUFFER_LINKEDIN_PROFILE_ID }}
        run: |
          if [ -z "$BUFFER_ACCESS_TOKEN" ]; then
            echo "BUFFER_ACCESS_TOKEN not set, skipping"
            exit 0
          fi
          buffer_post() {
            local text="$1"
            local profile_id="$2"
            local label="$3"
            
            STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              "https://api.buffer.com/1/updates/create.json" \
              -H "Authorization: Bearer $BUFFER_ACCESS_TOKEN" \
              --data-urlencode "text=$text" \
              --data-urlencode "profile_ids[]=$profile_id" \
              --data-urlencode "now=true")
            
            if [ "$STATUS_CODE" = "201" ] || [ "$STATUS_CODE" = "200" ]; then
              echo "  ✓ Posted to $label"
            else
              echo "  ✗ $label failed (HTTP $STATUS_CODE)"
              return 1
            fi
          }
          
          echo "Posting to Buffer..."
          FAILED=0
          [ -n "$TWITTER_PROFILE_ID" ] && buffer_post "$TWITTER_POST" "$TWITTER_PROFILE_ID" "Twitter" || FAILED=1
          [ -n "$LINKEDIN_PROFILE_ID" ] && buffer_post "$LINKEDIN_POST" "$LINKEDIN_PROFILE_ID" "LinkedIn" || FAILED=1
          [ "$FAILED" = "1" ] && exit 1
          echo "All Buffer posts sent successfully"
          
      # Create a log of the generated post
      - name: Log Social Media Posts
        run: |
          mkdir -p logs
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > "logs/social_post_${TIMESTAMP}.txt" << EOF
          Date: $TIMESTAMP
          Post: $NEWEST_POST
          Title: $POST_TITLE
          
          Twitter:
          $TWITTER_POST
          
          LinkedIn:
          $LINKEDIN_POST
          EOF

      - name: Commit and Push Log
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add logs/
          git commit -m "Add social media post log for $NEWEST_POST" || echo "No changes to commit"
          git push origin main || echo "No changes to push"
